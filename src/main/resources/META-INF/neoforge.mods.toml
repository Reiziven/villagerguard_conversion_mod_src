modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
    modId="${mod_id}"
    version="${mod_version}"
    displayName="${mod_name}"
    description='''${mod_description}'''

    [[mods.dependencies.${mod_id}]]
        modId="neoforge"
        type="required"
        versionRange="${neo_version_range}"
        ordering="NONE"
        side="BOTH"

    [[mods.dependencies.${mod_id}]]
        modId="minecraft"
        type="required"
        versionRange="${minecraft_version_range}"
        ordering="NONE"
        side="BOTH"

    # Optional dependency on Guard Villagers mod
    [[mods.dependencies.${mod_id}]]
        modId="guardvillagers"
        type="optional"
        versionRange="[1.0,)"
        ordering="NONE"
        side="BOTH"
